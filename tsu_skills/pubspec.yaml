name: tsu_skills
description: "TSU Skills - university job platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.8.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  auto_route: ^10.1.2
  http: ^1.2.0
  get_it: ^8.2.0
  injectable: ^2.5.1
  bloc: ^9.0.0
  flutter_bloc: ^9.1.1
  meta: ^1.16.0
  freezed_annotation: ^3.1.0
  freezed: ^3.2.3
  build_runner: ^2.5.4
  flutter_svg: ^2.0.9
  fpdart: ^1.1.1
  image_picker: ^1.2.0
  json_annotation: ^4.9.0
  collection: ^1.19.1
  choice: ^2.3.2
  source_gen: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  auto_route_generator: ^10.2.3
  injectable_generator: ^2.8.1
  flutter_gen_runner: ^5.12.0
  json_serializable: ^6.11.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
    - assets/image/

flutter_gen:
  output: lib/shared/assets/

  integrations:
    flutter_svg: true
